# Secrets for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
type: Opaque
data:
  # Base64 encoded credentials
  username: dXNlcm5hbWU=  # "username" in base64
  password: cGFzc3dvcmQ=  # "password" in base64
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
data:
  # Base64 encoded MongoDB credentials (if needed for future authentication)
  username: YWRtaW4=      # "admin" in base64
  password: bW9uZ29wYXNz  # "mongopass" in base64
---